<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon part -->
  <g>
    <!-- Background circle with gradient -->
    <defs>
      <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- Circle background -->
    <circle cx="24" cy="24" r="22" fill="url(#logoGrad)"/>
    
    <!-- Letter "A" with nodes -->
    <!-- Top node -->
    <circle cx="24" cy="12" r="3" fill="white"/>
    
    <!-- Left node -->
    <circle cx="15" cy="28" r="3" fill="white"/>
    
    <!-- Right node -->
    <circle cx="33" cy="28" r="3" fill="white"/>
    
    <!-- Lines forming A -->
    <line x1="24" y1="15" x2="15" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="15" x2="33" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="25" x2="30" y2="25" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Bottom nodes -->
    <circle cx="24" cy="35" r="2" fill="white" opacity="0.7"/>
    <circle cx="12" cy="35" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="36" cy="35" r="1.5" fill="white" opacity="0.6"/>
    
    <!-- Connection lines -->
    <line x1="15" y1="31" x2="13" y2="33.5" stroke="white" stroke-width="1.2" opacity="0.5"/>
    <line x1="33" y1="31" x2="35" y2="33.5" stroke="white" stroke-width="1.2" opacity="0.5"/>
    <line x1="15" y1="31" x2="22" y2="33.5" stroke="white" stroke-width="1.2" opacity="0.5"/>
    <line x1="33" y1="31" x2="26" y2="33.5" stroke="white" stroke-width="1.2" opacity="0.5"/>
  </g>
  
  <!-- Text "AETHER" -->
  <text x="56" y="32" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">AETHER</text>
</svg>
