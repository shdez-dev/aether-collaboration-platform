<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  
  <!-- Letter "A" stylized as connected nodes (representing collaboration) -->
  <!-- Top node -->
  <circle cx="256" cy="140" r="28" fill="white" opacity="0.95"/>
  
  <!-- Left node -->
  <circle cx="180" cy="280" r="28" fill="white" opacity="0.95"/>
  
  <!-- Right node -->
  <circle cx="332" cy="280" r="28" fill="white" opacity="0.95"/>
  
  <!-- Connecting lines forming "A" shape -->
  <line x1="256" y1="168" x2="180" y2="252" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
  <line x1="256" y1="168" x2="332" y2="252" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
  <line x1="200" y1="280" x2="312" y2="280" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Bottom nodes (representing extended network/collaboration) -->
  <circle cx="256" cy="360" r="20" fill="white" opacity="0.7"/>
  <circle cx="140" cy="360" r="16" fill="white" opacity="0.6"/>
  <circle cx="372" cy="360" r="16" fill="white" opacity="0.6"/>
  
  <!-- Connection lines to bottom nodes -->
  <line x1="180" y1="308" x2="156" y2="344" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="332" y1="308" x2="356" y2="344" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="180" y1="308" x2="256" y2="340" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="332" y1="308" x2="256" y2="340" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
</svg>
