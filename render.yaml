databases:
  - name: aether-postgres
    databaseName: aether_production
    user: aether
    region: oregon
    plan: free

services:
  - type: redis
    name: aether-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all

  - type: web
    name: aether-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: aether-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: aether-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://aether-web-1yk3.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://aether-web-1yk3.onrender.com
      - key: FRONTEND_URL
        value: https://aether-web-1yk3.onrender.com
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: aether.notifications@gmail.com
      - key: EMAIL_FROM_NAME
        value: Aether Platform

  - type: web
    name: aether-web
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    healthCheckPath: /
    dockerCommand: pnpm start -p ${PORT:-3001} -H 0.0.0.0
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NEXT_PUBLIC_API_URL
        value: https://aether-api-qjkz.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://aether-api-qjkz.onrender.com
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
