<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Page dark mode palette: bg #121212, surface #1f1f1f, border #333333, accent #3B82F6, text #f8fafc, muted #94a3b8 -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="glowH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="1200" height="280" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background: #121212 -->
  <rect width="1200" height="280" rx="4" fill="#121212"/>

  <!-- Subtle grid: border color #333333 -->
  <g clip-path="url(#rounded)" opacity="0.3">
    <line x1="0" y1="40" x2="1200" y2="40" stroke="#333333" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#333333" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#333333" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#333333" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#333333" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#333333" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="280" stroke="#333333" stroke-width="0.5"/>
    <line x1="1100" y1="0" x2="1100" y2="280" stroke="#333333" stroke-width="0.5"/>
  </g>

  <!-- Right-side decorative network graph -->
  <g clip-path="url(#rounded)" opacity="0.18">
    <circle cx="950" cy="60" r="5" fill="#3B82F6"/>
    <circle cx="1020" cy="105" r="4" fill="#3B82F6"/>
    <circle cx="1085" cy="52" r="6" fill="#3B82F6"/>
    <circle cx="1145" cy="88" r="4" fill="#3B82F6"/>
    <circle cx="1005" cy="165" r="5" fill="#3B82F6"/>
    <circle cx="1065" cy="205" r="4" fill="#3B82F6"/>
    <circle cx="1135" cy="162" r="5" fill="#3B82F6"/>
    <circle cx="1162" cy="225" r="3" fill="#3B82F6"/>
    <circle cx="962" cy="222" r="4" fill="#3B82F6"/>
    <circle cx="1092" cy="132" r="3" fill="#3B82F6"/>
    <line x1="950" y1="60" x2="1020" y2="105" stroke="#3B82F6" stroke-width="1"/>
    <line x1="1020" y1="105" x2="1085" y2="52" stroke="#3B82F6" stroke-width="1"/>
    <line x1="1085" y1="52" x2="1145" y2="88" stroke="#3B82F6" stroke-width="1"/>
    <line x1="1020" y1="105" x2="1005" y2="165" stroke="#3B82F6" stroke-width="1"/>
    <line x1="1005" y1="165" x2="1065" y2="205" stroke="#3B82F6" stroke-width="1"/>
    <line x1="1065" y1="205" x2="1135" y2="162" stroke="#3B82F6" stroke-width="1"/>
    <line x1="1135" y1="162" x2="1162" y2="225" stroke="#3B82F6" stroke-width="1"/>
    <line x1="1005" y1="165" x2="962" y2="222" stroke="#3B82F6" stroke-width="1"/>
    <line x1="1085" y1="52" x2="1092" y2="132" stroke="#3B82F6" stroke-width="1"/>
    <line x1="1092" y1="132" x2="1135" y2="162" stroke="#3B82F6" stroke-width="1"/>
    <line x1="1145" y1="88" x2="1092" y2="132" stroke="#3B82F6" stroke-width="1"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="#3B82F6" clip-path="url(#rounded)"/>

  <!-- Bottom glow line -->
  <rect x="150" y="275" width="900" height="1" rx="1" fill="url(#glowH)" opacity="0.6"/>

  <!-- Logo icon -->
  <g transform="translate(72, 94)">
    <rect width="92" height="92" rx="4" fill="#1f1f1f"/>
    <rect width="92" height="92" rx="4" fill="none" stroke="#333333" stroke-width="1"/>
    <circle cx="46" cy="20" r="5.5" fill="#3B82F6" filter="url(#glow)"/>
    <circle cx="22" cy="66" r="5.5" fill="#3B82F6" filter="url(#glow)"/>
    <circle cx="70" cy="66" r="5.5" fill="#3B82F6" filter="url(#glow)"/>
    <line x1="46" y1="25" x2="22" y2="61" stroke="#3B82F6" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="46" y1="25" x2="70" y2="61" stroke="#3B82F6" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="30" y1="52" x2="62" y2="52" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="46" cy="76" r="3.5" fill="#94a3b8" opacity="0.6"/>
    <line x1="22" y1="71" x2="43" y2="74" stroke="#94a3b8" stroke-width="1.5" opacity="0.4"/>
    <line x1="70" y1="71" x2="49" y2="74" stroke="#94a3b8" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Main title -->
  <text x="196" y="152" font-family="'JetBrains Mono', 'Courier New', 'SF Mono', monospace" font-size="68" font-weight="700" letter-spacing="12" fill="#f8fafc" filter="url(#glow)">AETHER</text>

  <!-- Accent underline for title -->
  <rect x="198" y="162" width="420" height="2" rx="1" fill="#3B82F6" opacity="0.6"/>

  <!-- Tagline -->
  <text x="198" y="190" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13.5" font-weight="400" letter-spacing="1.5" fill="#94a3b8">Event-driven collaboration platform - real-time sync across distributed teams</text>

  <!-- Bottom meta -->
  <text x="72" y="255" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#333333" letter-spacing="1">v0.1.0</text>
  <circle cx="198" cy="252" r="4" fill="#3B82F6" filter="url(#glow)" opacity="0.85"/>
  <text x="210" y="256" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8" letter-spacing="1">ONLINE</text>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="1199" height="279" rx="3.5" fill="none" stroke="#333333" stroke-width="1"/>
</svg>
